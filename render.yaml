services:
  - type: web
    name: annapurna-pos-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JWT_SECRET
        value: "annapurna-pos-dev-secret-key-2025"
      - key: DB_NAME
        value: "annapurna_pos"
      - key: MONGO_URL
        value: "mongodb+srv://officialanant17:Anantsachin@cluster0.xrpbcut.mongodb.net/?appName=Cluster0"
